<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teachers</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="sidebarContainer"></div>

<div class="main">
<h1>Teacher Management</h1>

<h3>Add Teacher</h3>
<form id="teacherForm">
<input type="text" id="teacherName" placeholder="Teacher Name" required>
<input type="email" id="teacherEmail" placeholder="Email" required>
<input type="text" id="teacherPhone" placeholder="Phone" required>
<input type="text" id="teacherSubject" placeholder="Subject" required>
<button type="submit">Add Teacher</button>
</form>

<h3>Teachers List</h3>
<table id="teachersTable">
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Subject</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>
const teacherForm = document.getElementById('teacherForm');
const teachersTable = document.getElementById('teachersTable').querySelector('tbody');

async function fetchTeachers() {
  try {
    const res = await fetch("http://localhost:3000/api/teachers");
    const teachers = await res.json();
    teachersTable.innerHTML = "";
    teachers.forEach(t => {
      const row = document.createElement('tr');
      row.innerHTML = `<td>${t.name}</td><td>${t.email}</td><td>${t.phone}</td><td>${t.subject}</td>`;
      teachersTable.appendChild(row);
    });
  } catch(err) { console.error(err); }
}

fetchTeachers();

teacherForm.addEventListener('submit', async function(e){
  e.preventDefault();
  const name = document.getElementById('teacherName').value;
  const email = document.getElementById('teacherEmail').value;
  const phone = document.getElementById('teacherPhone').value;
  const subject = document.getElementById('teacherSubject').value;

  try {
    await fetch("http://localhost:3000/api/teachers", {
      method:"POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({name,email,phone,subject})
    });
    fetchTeachers();
    teacherForm.reset();
  } catch(err){ console.error(err); }
});
</script>

<script>
fetch("sidebar.html")
  .then(response => response.text())
  .then(data => { document.getElementById("sidebarContainer").innerHTML = data; });
</script>
</body>
</html>
